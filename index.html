<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaCalc — Calculate Beyond Numbers</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body data-theme="nebula">

  <!-- Animated Background -->
  <div class="bg-canvas" aria-hidden="true">
    <canvas id="particle-canvas"></canvas>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="math-symbols" id="math-symbols"></div>
  </div>

  <!-- Hero Section -->
  <header class="hero" id="hero">
    <div class="hero-eyebrow">NOVA SCIENTIFIC v2.4</div>
    <h1 class="hero-headline">Calculate Beyond<br /><span class="gradient-text">Numbers</span></h1>
    <p class="hero-sub">Precision. Power. Simplicity.</p>
  </header>

  <!-- Controls Bar -->
  <div class="controls-bar" id="controls-bar">
    <!-- Theme Switcher -->
    <div class="theme-switcher" role="group" aria-label="Color theme">
      <button class="theme-btn active" data-theme="nebula" title="Nebula" aria-label="Nebula theme"><span class="theme-dot"></span></button>
      <button class="theme-btn" data-theme="matrix" title="Matrix" aria-label="Matrix theme"><span class="theme-dot"></span></button>
      <button class="theme-btn" data-theme="solar" title="Solar" aria-label="Solar theme"><span class="theme-dot"></span></button>
      <button class="theme-btn" data-theme="arctic" title="Arctic" aria-label="Arctic theme"><span class="theme-dot"></span></button>
    </div>
    <!-- Sound Toggle -->
    <button class="icon-btn sound-btn" id="sound-toggle" aria-label="Toggle sound" title="Toggle sound">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
        <path d="M11 5L6 9H2v6h4l5 4V5z"/>
        <path class="sound-wave-1" d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path class="sound-wave-2" d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    </button>
    <!-- History Toggle -->
    <button class="icon-btn hist-btn" id="history-toggle" aria-label="Toggle history" title="Calculation history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
    </button>
  </div>

  <!-- Calculator -->
  <main class="calc-wrapper" id="calc-wrapper" role="main">
    <div class="calc" id="calc" tabindex="0" aria-label="NovaCalc scientific calculator">

      <!-- Header strip -->
      <div class="calc-header">
        <div class="calc-brand">
          <span class="brand-dot"></span>
          NOVACALC
        </div>
        <div class="calc-mode" id="calc-mode">RAD</div>
      </div>

      <!-- Display -->
      <div class="calc-display" aria-live="polite">
        <div class="display-expr" id="display-expr"></div>
        <div class="display-main" id="display-main">0</div>
      </div>

      <!-- Button Grid -->
      <div class="calc-grid">

        <!-- Row 1: functions -->
        <button class="btn btn-fn" data-action="sin"   aria-label="Sine">sin</button>
        <button class="btn btn-fn" data-action="cos"   aria-label="Cosine">cos</button>
        <button class="btn btn-fn" data-action="tan"   aria-label="Tangent">tan</button>
        <button class="btn btn-fn" data-action="log"   aria-label="Logarithm base 10">log</button>
        <button class="btn btn-fn" data-action="ln"    aria-label="Natural logarithm">ln</button>

        <!-- Row 2 -->
        <button class="btn btn-fn" data-action="asin"  aria-label="Arc sine">sin⁻¹</button>
        <button class="btn btn-fn" data-action="acos"  aria-label="Arc cosine">cos⁻¹</button>
        <button class="btn btn-fn" data-action="atan"  aria-label="Arc tangent">tan⁻¹</button>
        <button class="btn btn-fn" data-action="sqrt"  aria-label="Square root">√</button>
        <button class="btn btn-fn" data-action="abs"   aria-label="Absolute value">|x|</button>

        <!-- Row 3 -->
        <button class="btn btn-fn" data-action="pi"    aria-label="Pi">π</button>
        <button class="btn btn-fn" data-action="e"     aria-label="Euler's number">e</button>
        <button class="btn btn-fn" data-action="sq"    aria-label="Square">x²</button>
        <button class="btn btn-fn" data-action="cube"  aria-label="Cube">x³</button>
        <button class="btn btn-fn" data-action="pow"   aria-label="Power">xʸ</button>

        <!-- Row 4 -->
        <button class="btn btn-fn" data-action="fact"  aria-label="Factorial">n!</button>
        <button class="btn btn-fn" data-action="inv"   aria-label="Inverse">1/x</button>
        <button class="btn btn-fn" data-action="mod"   aria-label="Modulo">mod</button>
        <button class="btn btn-fn" data-action="("     aria-label="Open parenthesis">(</button>
        <button class="btn btn-fn" data-action=")"     aria-label="Close parenthesis">)</button>

        <!-- Divider -->
        <div class="grid-divider"></div>

        <!-- Row 5: standard -->
        <button class="btn btn-utility" data-action="AC"  aria-label="All clear">AC</button>
        <button class="btn btn-utility" data-action="DEL" aria-label="Delete">DEL</button>
        <button class="btn btn-utility" data-action="%"   aria-label="Percent">%</button>
        <button class="btn btn-op"      data-action="/"   aria-label="Divide">÷</button>

        <!-- Row 6 -->
        <button class="btn btn-num" data-action="7">7</button>
        <button class="btn btn-num" data-action="8">8</button>
        <button class="btn btn-num" data-action="9">9</button>
        <button class="btn btn-op"  data-action="*" aria-label="Multiply">×</button>

        <!-- Row 7 -->
        <button class="btn btn-num" data-action="4">4</button>
        <button class="btn btn-num" data-action="5">5</button>
        <button class="btn btn-num" data-action="6">6</button>
        <button class="btn btn-op"  data-action="-" aria-label="Subtract">−</button>

        <!-- Row 8 -->
        <button class="btn btn-num" data-action="1">1</button>
        <button class="btn btn-num" data-action="2">2</button>
        <button class="btn btn-num" data-action="3">3</button>
        <button class="btn btn-op"  data-action="+" aria-label="Add">+</button>

        <!-- Row 9 -->
        <button class="btn btn-num btn-zero" data-action="0">0</button>
        <button class="btn btn-num" data-action=".">.</button>
        <button class="btn btn-equals" data-action="=" aria-label="Equals">=</button>

      </div>

      <!-- Scan-line overlay -->
      <div class="scanlines" aria-hidden="true"></div>
    </div>

    <!-- History Panel -->
    <aside class="history-panel" id="history-panel" aria-label="Calculation history" aria-hidden="true">
      <div class="history-header">
        <span>History</span>
        <button class="icon-btn" id="clear-history" aria-label="Clear all history">Clear all</button>
      </div>
      <ul class="history-list" id="history-list" role="list"></ul>
      <p class="history-empty" id="history-empty">No calculations yet.</p>
    </aside>
  </main>

  <!-- Angle mode toggle (below calc) -->
  <div class="angle-toggle" id="angle-toggle">
    <button class="angle-btn active" data-angle="RAD">RAD</button>
    <button class="angle-btn" data-angle="DEG">DEG</button>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
